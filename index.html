<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrosel 3D</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <h1>Carrosel 3D de Imagens</h1>

    <div class="carrosel-container">

        <button class="anterior">&#10094;</button>

        <div class="carrosel">
            <div class="slide">
                <a href="p07_imagens/Imagem1.jpg" target="_blank">

                    <img src="p07_imagens/Imagem1.jpg" alt="Imagem 1">
                </a>
                <div class="info">

                    <h2>Leão</h2>

                    <p>Rei da Floresta</p>
                </div>
            </div>

            <div class="slide">

                <a href="p07_imagens/Imagem2.jpg" target="_blank">
                    <img src="p07_imagens/Imagem2.jpg" alt="Imagem 2">
                </a>

                <div class="info">

                    <h2>Foca</h2>

                    <p>Gostam de brincar.</p>
                </div>
            </div>

            <div class="slide">

                <a href="p07_imagens/Imagem3.jpg" target="_blank">
                    <img src="p07_imagens/Imagem3.jpg" alt="Imagem 3">

                </a>

                <div class="info">

                    <h2>Casa de Campo</h2>

                    <p>Bom para descansar.</p>
                </div>
            </div>

            <div class="slide">
                <a href="p07_imagens/Imagem4.jpg" target="_blank">

                    <img src="p07_imagens/Imagem4.jpg" alt="Imagem 4">
                </a>

                <div class="info">

                    <h2>Peixe</h2>
                    <p>São lindos e vivem no rio ou mar.</p>
                </div>
            </div>
        </div>

        <button class="proximo">&#10095;</button>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
